name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'my-insta-dm/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      # 1. 코드 체크아웃 (token 명시 — 이후 git push 인증에 자동 사용)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Node.js 설정
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: my-insta-dm/package-lock.json

      # 3. 의존성 설치
      - name: Install dependencies
        working-directory: my-insta-dm
        run: npm ci

      # 4. Expo prebuild — iOS 네이티브 프로젝트 생성
      - name: Expo prebuild
        working-directory: my-insta-dm
        run: npx expo prebuild --platform ios --clean

      # 5. CocoaPods 설치
      - name: Install CocoaPods
        working-directory: my-insta-dm/ios
        run: pod install --repo-update

      # 6. xcworkspace / scheme 이름 동적 탐지
      - name: Detect workspace and scheme
        id: xcode
        working-directory: my-insta-dm/ios
        run: |
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "workspace=${WORKSPACE}" >> $GITHUB_OUTPUT
          echo "scheme=${SCHEME}" >> $GITHUB_OUTPUT
          echo "🔍 workspace: ${WORKSPACE}, scheme: ${SCHEME}"
          echo "📁 ios 디렉토리 내용:"
          ls -la

      # 7. 서명 없이 아카이브 빌드
      - name: Build iOS archive (unsigned)
        working-directory: my-insta-dm
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace "ios/${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -archivePath ./build/myinstadm.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild.log | tail -50

      # 8. 아카이브 내용 확인 (디버깅용)
      - name: Inspect archive
        working-directory: my-insta-dm
        run: |
          echo "📁 build/ 내용:"
          find build/ -type f -o -type d | head -30

      # 9. .xcarchive → .ipa 패키징
      - name: Package .ipa
        working-directory: my-insta-dm
        run: |
          APP_PATH=$(find build/myinstadm.xcarchive/Products/Applications -name "*.app" | head -1)
          echo "📦 앱 경로: ${APP_PATH}"
          mkdir -p Payload
          cp -r "${APP_PATH}" Payload/
          zip -r myinstadm.ipa Payload/
          echo "✅ .ipa 생성 완료"
          ls -lh myinstadm.ipa

      # 10. 버전 태그 추출
      - name: Get version
        id: version
        working-directory: my-insta-dm
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          BUILD_NUM=${{ github.run_number }}
          echo "tag=v${VERSION}-build${BUILD_NUM}" >> $GITHUB_OUTPUT
          echo "name=v${VERSION} (build ${BUILD_NUM})" >> $GITHUB_OUTPUT

      # 11. GitHub Releases에 .ipa 업로드
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## 설치 방법
            1. 아래 `myinstadm.ipa` 다운로드
            2. iPhone 파일 앱에서 열기 → AltStore로 설치
            3. AltStore가 없다면 먼저 AltServer로 설치 필요

            ## 변경사항
            커밋: ${{ github.sha }}
          files: my-insta-dm/myinstadm.ipa
          make_latest: true

      # 12. AltStore source.json 갱신
      - name: Update AltStore source.json
        run: |
          VERSION=$(node -p "require('./my-insta-dm/app.json').expo.version")
          BUILD_NUM=${{ github.run_number }}
          TAG="v${VERSION}-build${BUILD_NUM}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")
          SIZE=$(wc -c < my-insta-dm/myinstadm.ipa | xargs)
          DOWNLOAD_URL="https://github.com/GB6105/my-insta-dm-react/releases/download/${TAG}/myinstadm.ipa"

          jq --arg version "$VERSION" \
             --arg date "$DATE" \
             --arg url "$DOWNLOAD_URL" \
             --arg desc "Build ${BUILD_NUM}" \
             --argjson size "$SIZE" \
             '.apps[0].versions = [{"version": $version, "date": $date, "localizedDescription": $desc, "downloadURL": $url, "size": $size}] + .apps[0].versions' \
             altstore-source.json > altstore-source.tmp.json
          mv altstore-source.tmp.json altstore-source.json
          echo "✅ source.json 갱신:"
          jq '.apps[0].versions[0]' altstore-source.json

      # 13. 갱신된 source.json 커밋 & 푸시
      - name: Commit and push source.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add altstore-source.json
          # 변경사항이 없으면 커밋 스킵 (정상 종료)
          git diff --staged --quiet && echo "변경사항 없음, 스킵" && exit 0
          git commit -m "chore: AltStore source.json 갱신 (build ${{ github.run_number }}) [skip ci]"
          git push origin main

      # 14. 빌드 실패 시 xcodebuild 로그 업로드
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: my-insta-dm/xcodebuild.log
