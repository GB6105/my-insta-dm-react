name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'my-insta-dm/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js 설정
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: my-insta-dm/package-lock.json

      # 3. 의존성 설치
      - name: Install dependencies
        working-directory: my-insta-dm
        run: npm ci

      # 4. Expo prebuild — iOS 네이티브 프로젝트 생성
      - name: Expo prebuild
        working-directory: my-insta-dm
        run: npx expo prebuild --platform ios --clean

      # 4-1. expo-task-manager Swift 파일 패치
      # 문제: npm 패키지의 findAppUrl()이 String?을 반환하지만 Pod는 String을 요구
      # 수정: public func findAppUrl() -> String { ... ?? "" }
      - name: Patch expo-task-manager Swift file
        working-directory: my-insta-dm
        run: |
          SWIFT_FILE="node_modules/expo-task-manager/ios/TaskManagerModule.swift"
          # 패치: findAppUrl() String? → String (setTaskManager withUrl: nonnull 요구)
          # 프로토콜 미충족의 근본 원인 — String? 타입 때문에 메서드 바디 컴파일 실패
          sed -i '' \
            's/private func findAppUrl() -> String?/public func findAppUrl() -> String/' \
            "$SWIFT_FILE"
          sed -i '' \
            's/return appContext?.constants?.constants()\["experienceUrl"\] as? String$/return appContext?.constants?.constants()["experienceUrl"] as? String ?? ""/' \
            "$SWIFT_FILE"
          echo "✅ TaskManagerModule.swift 패치 완료"
          grep -n "findAppUrl" "$SWIFT_FILE"

      # 5. Podfile 패치 — 모든 Pod에 Swift 5 강제 설정 (Xcode 16 Swift 6 컴파일 오류 방지)
      - name: Patch Podfile Swift version
        working-directory: my-insta-dm/ios
        run: |
          ruby - << 'RUBY'
          content = File.read('Podfile')
          patch = <<~PATCH

            # Swift 5 강제 설정 (Xcode 16 호환)
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['SWIFT_VERSION'] = '5.0'
              end
            end
          PATCH
          content = content.sub(/^(post_install do \|installer\|)/, "\\1#{patch}")
          File.write('Podfile', content)
          RUBY
          echo "✅ Podfile 패치 완료"

      # 6. CocoaPods 설치
      - name: Install CocoaPods
        working-directory: my-insta-dm/ios
        run: pod install --repo-update

      # 6. xcworkspace / scheme 이름 동적 탐지
      - name: Detect workspace and scheme
        id: xcode
        working-directory: my-insta-dm/ios
        run: |
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "workspace=${WORKSPACE}" >> $GITHUB_OUTPUT
          echo "scheme=${SCHEME}" >> $GITHUB_OUTPUT
          echo "🔍 workspace: ${WORKSPACE}, scheme: ${SCHEME}"
          echo "📁 ios 디렉토리 내용:"
          ls -la

      # 7. 서명 없이 아카이브 빌드 (에러 그대로 노출)
      - name: Build iOS archive (unsigned)
        working-directory: my-insta-dm
        run: |
          xcodebuild archive \
            -workspace "ios/${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -archivePath ./build/myinstadm.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=5 \
            2>&1 | tee xcodebuild.log || true

          # 실제 컴파일 에러 라인만 추출해서 출력
          echo "=== 컴파일 에러 ==="
          grep -E "\.swift:[0-9]+:[0-9]+: error:" xcodebuild.log | head -30 || echo "(에러 없음)"

          # ARCHIVE FAILED 시 종료 코드 1
          if grep -q "ARCHIVE FAILED" xcodebuild.log; then
            exit 1
          fi

      # 8. 아카이브 내용 확인 (디버깅용)
      - name: Inspect archive
        working-directory: my-insta-dm
        run: |
          echo "📁 build/ 내용:"
          find build/ -type f -o -type d | head -30

      # 9. .xcarchive → .ipa 패키징
      - name: Package .ipa
        working-directory: my-insta-dm
        run: |
          APP_PATH=$(find build/myinstadm.xcarchive/Products/Applications -name "*.app" | head -1)
          echo "📦 앱 경로: ${APP_PATH}"
          mkdir -p Payload
          cp -r "${APP_PATH}" Payload/
          zip -r myinstadm.ipa Payload/
          echo "✅ .ipa 생성 완료"
          ls -lh myinstadm.ipa

      # 10. 버전 태그 추출
      - name: Get version
        id: version
        working-directory: my-insta-dm
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          BUILD_NUM=${{ github.run_number }}
          echo "tag=v${VERSION}-build${BUILD_NUM}" >> $GITHUB_OUTPUT
          echo "name=v${VERSION} (build ${BUILD_NUM})" >> $GITHUB_OUTPUT

      # 11. GitHub Releases에 .ipa 업로드
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## 설치 방법
            1. 아래 `myinstadm.ipa` 다운로드
            2. iPhone 파일 앱에서 열기 → AltStore로 설치
            3. AltStore가 없다면 먼저 AltServer로 설치 필요

            ## 변경사항
            커밋: ${{ github.sha }}
          files: my-insta-dm/myinstadm.ipa
          make_latest: true

      # 12. 빌드 실패 시 xcodebuild 로그 업로드
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: my-insta-dm/xcodebuild.log
